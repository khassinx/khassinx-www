title: KhassinX
description: Independent studio building privacy-first apps for Apple platforms. ASVAB Coach, Khazen, and more — on-device AI, native Apple Watch, zero tracking.
url: https://khassinx.com
lang: en

# Layer 1 umbrella site: usa tokens.css (charcoal + warm gold)
umbrella_tokens: true

# Favicons (umbrella K monogram)
favicon_svg: /assets/favicons/favicon.svg

# Navigation
nav:
  - title: Apps
    url: "#apps"
  - title: Contact
    url: "mailto:hello@khassinx.com"

footer_nav:
  - title: Security
    url: "/security/"
  - title: Legal
    url: "/legal/"
  - title: Contact
    url: "mailto:hello@khassinx.com"

# Jekyll config
markdown: kramdown

exclude:
  - README.md
  - .gitignore
  - LICENSE

# Jekyll por default ignora dotfiles/dotdirs. .well-known DEBE servirse
# (RFC 9116 security.txt requiere path exacto /.well-known/security.txt).
include:
  - .well-known
