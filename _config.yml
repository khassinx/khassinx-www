title: KhassinX
description: Independent studio building privacy-first apps for Apple platforms. ASVAB Coach, Khazen, and more — on-device AI, native Apple Watch, zero tracking.
url: https://khassinx.com
lang: en

# Layer 1 umbrella site
umbrella_tokens: true

# Favicons (umbrella K monogram)
favicon_svg: /assets/favicons/favicon.svg

# Navigation — keyed por locale. El layout selecciona via page.lang con fallback a 'en'.
nav:
  en:
    - title: Apps
      url: "#apps"
    - title: Contact
      url: "mailto:hello@khassinx.com"
  es:
    - title: Apps
      url: "/es/#apps"
    - title: Contacto
      url: "mailto:hello@khassinx.com"

footer_nav:
  en:
    - title: Security
      url: "/security/"
    - title: Legal
      url: "/legal/"
    - title: Contact
      url: "mailto:hello@khassinx.com"
  es:
    - title: Seguridad
      url: "/es/security/"
    - title: Legal
      url: "/es/legal/"
    - title: Contacto
      url: "mailto:hello@khassinx.com"

# Skip-link y "Part of ecosystem" copy por locale (lo consume base.html)
ui_strings:
  en:
    skip_to_main: "Skip to main content"
    part_of_ecosystem_prefix: "Part of the"
    part_of_ecosystem_label: "KhassinX ecosystem"
    ecosystem_url: "https://khassinx.com"
  es:
    skip_to_main: "Saltar al contenido principal"
    part_of_ecosystem_prefix: "Parte del"
    part_of_ecosystem_label: "ecosistema KhassinX"
    ecosystem_url: "https://khassinx.com/es/"

# Jekyll config
markdown: kramdown

exclude:
  - README.md
  - .gitignore
  - LICENSE

# Jekyll por default ignora dotfiles/dotdirs. .well-known DEBE servirse
# (RFC 9116 security.txt requiere path exacto /.well-known/security.txt).
include:
  - .well-known
