---
layout: base
---

<article class="container container-narrow prose" style="padding-top: var(--space-3xl); padding-bottom: var(--space-3xl);">
  {% if page.title %}<h1>{{ page.title }}</h1>{% endif %}
  {% if page.updated %}<p class="text-tertiary"><small>Last updated: {{ page.updated }}</small></p>{% endif %}

  {{ content }}
</article>
